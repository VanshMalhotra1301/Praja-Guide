services:
  - type: web
    name: praja-guide
    env: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt --prefer-binary"
    startCommand: "gunicorn -w 2 -b 0.0.0.0:$PORT run:app"
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
