services:
  - type: web
    name: praja-guide
    env: python
    plan: free
    buildCommand: "python -m pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn -w 2 -b 0.0.0.0:$PORT run:app"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: SECRET_KEY
        generateValue: true
